<nav class="navbar">
    <header class="nav-header">
        App navigation:
    </header>

    <div class="nav-inner">
        <ul class="nav-links">
            @for (item of navItems; track item.link) {
                <li>
                    <a
                        routerLinkActive="active-a"
                        [routerLink]="item.link"
                        [routerLinkActiveOptions]="{ exact: item.exact }"
                    >
                        {{ item.label }}
                    </a>
                </li>
            }
        </ul>
    </div>
</nav>

<div class="overflow-y-scroll">
    <router-outlet></router-outlet>
</div>
