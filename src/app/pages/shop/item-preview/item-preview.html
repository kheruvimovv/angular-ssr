@if (item$ | async; as item) {
    <div class="preview-wrapper">
        <button class="back-btn"
                routerLink="../">
            ← Back to catalog
        </button>

        <div class="preview-card">
            <div class="image-section">
                <img [src]="item.imgUrl" [alt]="item.title" />
            </div>

            <div class="info-section">
                <h2>{{ item.title }}</h2>

                <p class="description">
                    {{ item.description }}
                </p>

                <div class="price">
                    {{ item.cost }} €
                </div>

                <button class="buy-btn">
                    Add to cart
                </button>
            </div>
        </div>
    </div>
} @else {
    <div class="loading">
        Loading product...
    </div>
}
