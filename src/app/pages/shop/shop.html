<h1 class="shop-title">Shop71</h1>

@if (items$ | async; as items) {
    <div class="grid">
        @for (item of items; track item.id) {
            <div class="card">
                <a [routerLink]="[item.id]">
                    <img [src]="item.imgUrl" [alt]="item.title">

                    <div class="card-body">
                        <h3>{{ item.title }}</h3>
                        <p>{{ item.description }}</p>
                        <div class="price">{{ item.cost }} €</div>
                    </div>
                </a>
            </div>
        }
    </div>
} @else {
    <div class="loading">
        Loading products...
    </div>
}
